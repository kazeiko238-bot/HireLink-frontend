<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat | HireLink</title>

<link rel="stylesheet" href="css/conversation.css">
<link rel="icon" type="image/png" href="images/logo.png">
<link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/overlay.css">
</head>

<body>

<div class="chat-container">

    <!-- TOP BAR -->
    <header class="topbar">
        <div class="logo-container">
            <button class="back-btn" onclick="history.back()">&lt;</button>
            <div class="logo">HireLink Chat</div>
        </div>

        <button class="logout-btn" id="logoutBtn">Log Out</button>
    </header>

    <!-- MAIN CHAT AREA -->
    <div class="chat-body">

        <!-- LEFT: CONVERSATIONS -->
        <div class="conversation-list">
            <h3>Messages</h3>
            <div id="conversationList"></div>
        </div>

        <!-- RIGHT: CHAT BOX -->
        <div class="chat-box">

            <div id="chatHeader" class="chat-header">
                Select a conversation
            </div>

            <div id="messages" class="messages"></div>

            <div class="chat-input">
                <input type="text" id="messageInput" placeholder="Type a message...">
                <button id="sendBtn">Send</button>
            </div>

        </div>

    </div>

</div>

     <script src="overlay.js">3</script>
  <div id="loginOverlay" class="overlay hidden">
  <div class="auth-modal">
    <form id="login" class="auth-form active">
            <h2 class="form-title">Welcome Back</h2>
            
            <div class="form-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" class="form-control" placeholder="Enter your password" required>
                <div class="forgot-password">
                    <a href="#">Forgot password?</a>
                </div>
            </div>
            
            <div class="remember-me">
                <input type="checkbox" id="remember-me" name="remember">
                <label for="remember-me">Remember me</label>
            </div>
            
           <button type="button" class="btn" id="loginBtn">Login</button>
         
    </form>
  </div>
  </div>
   
<script src="conversation.js">3</script>

</body>
</html>
